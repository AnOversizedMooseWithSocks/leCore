# Continuous integration for the Holographic VSA engine.
#
# Runs the full pytest suite on every push and every pull request. The job only
# goes green if every test passes -- a single failing test makes pytest exit
# non-zero, which fails the job. To make that gate actually BLOCK a merge (not
# just show a red X), mark this check as required once:
#   GitHub repo -> Settings -> Branches -> Branch protection rule for `main`
#   -> "Require status checks to pass before merging" -> select "pytest".
#
# A handful of tests exercise the optional NLTK corpora (language ID, corpus-scale
# routing). Those skip themselves automatically when the data isn't installed, so
# they don't turn a clean runner red -- every other test must pass.

name: tests

# Direct pushes to any branch, plus all PRs. Branch pushes let fork/feature
# branches produce CI evidence even while an upstream PR waits for approval.
on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # No display on a CI runner, so force matplotlib's non-interactive backend --
    # a couple of modules import pyplot at load time and would otherwise complain.
    env:
      MPLBACKEND: Agg

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # the version the suite is developed against
          cache: pip               # reuse the pip wheel cache between runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the test suite
        run: pytest -q --durations=10

      # Keep API_QUICKREF.md current on its own: regenerate it and fail if the committed copy is stale.
      # This is a drift check (no write-back needed) -- if it fails, run `python apiquickref.py` locally and
      # commit the result. The generator only reads source with `ast`, so this step is fast and side-effect-free.
      - name: Check API_QUICKREF.md is up to date
        run: |
          python apiquickref.py
          git diff --exit-code API_QUICKREF.md || {
            echo "API_QUICKREF.md is out of date -- run 'python apiquickref.py' and commit the result.";
            exit 1;
          }

  c-kernel-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MPLBACKEND: Agg

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile, test, and benchmark the C kernel
        run: |
          python c/benchmarks/ci_evidence.py --output-dir c/build/ci-evidence

      - name: Publish C kernel evidence summary
        if: always()
        run: |
          if [ -f c/build/ci-evidence/report.md ]; then
            cat c/build/ci-evidence/report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload C kernel evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-kernel-evidence
          path: c/build/ci-evidence/
