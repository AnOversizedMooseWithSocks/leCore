# .github/workflows/docs.yml
# Keep REFERENCE.md in sync with the code automatically. On every push to main, regenerate the code reference
# from the module docstrings and commit it back if anything changed. (No third-party deps -- docgen.py is pure
# standard library.)
name: docs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:            # lets you run it by hand from the Actions tab

permissions:
  contents: write               # needed so the job can commit the refreshed REFERENCE.md back to the repo

jobs:
  reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate the code reference
        run: python docgen.py          # writes REFERENCE.md from every module's docstring + public API

      - name: Generate the capabilities menu
        run: python capdoc.py          # writes CAPABILITIES.md (prose) AND capabilities.json (machine-readable) from the live catalog

      - name: Commit refreshed docs if they changed
        run: |
          git config user.name  "docs-bot"
          git config user.email "docs-bot@users.noreply.github.com"
          if ! git diff --quiet REFERENCE.md CAPABILITIES.md capabilities.json; then
            git add REFERENCE.md CAPABILITIES.md capabilities.json
            git commit -m "docs: refresh REFERENCE.md + CAPABILITIES.md + capabilities.json [skip ci]"   # [skip ci] so it doesn't re-trigger CI
            git push
          else
            echo "REFERENCE.md, CAPABILITIES.md and capabilities.json already up to date -- nothing to commit."
          fi
